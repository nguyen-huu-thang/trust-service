syntax = "proto3";

package key;

option java_package = "vn.xime.key.proto";
option java_multiple_files = true;

// Key Service là một dịch vụ thuộc tầng Base Platform trong hệ thống microservice.
// Dịch vụ này chịu trách nhiệm quản lý khóa mật mã phục vụ cho việc xác thực và bảo mật giữa các service.
service KeyService {

  // Identity gọi
  rpc GetCurrentKey (GetKeyRequest) returns (KeyResponse);

  // Service khác gọi
  rpc GetPublicKeys (GetPublicKeysRequest) returns (PublicKeysResponse);
}

message GetKeyRequest {
  string service_name = 1;
}

message GetPublicKeysRequest {
  string service_name = 1;
}

message KeyResponse {
  string kid = 1;
  string public_key = 2;
  string private_key = 3;
}

message PublicKey {
  string kid = 1;
  string public_key = 2;
}

message PublicKeysResponse {
  repeated PublicKey keys = 1;
}