syntax = "proto3";

package key;

option java_package = "vn.xime.key.proto";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

// ========================================================
// SERVICE DEFINITION
// ========================================================

/*
Key Service là một dịch vụ thuộc tầng Base Platform trong hệ thống microservice.

Vai trò:
- Quản lý lifecycle của key (generate, rotate, expire)
- Cung cấp private key cho Identity Service (internal)
- Cung cấp public key cho các service khác để verify JWT

Nguyên tắc quan trọng:
- KHÔNG tham gia runtime signing
- KHÔNG phải runtime dependency (client phải cache key)
- Luôn trả full keyset (CURRENT + NEXT + OLD)

Client usage:

1. Identity Service:
   - Gọi GetKeys(include_private = true)
   - Dùng key có activate_at <= now gần nhất để SIGN
   - Preload NEXT để rotation không downtime

2. Other Services:
   - Gọi GetKeys(include_private = false)
   - Cache toàn bộ key
   - Verify JWT bằng cách lookup theo kid

⚠️ Lưu ý:
- KHÔNG dùng status để quyết định logic
- Logic phải dựa vào activate_at và expires_at
*/
service KeyService {

  // --------------------------------------------------------
  // Lấy toàn bộ key (full keyset)
  // --------------------------------------------------------
  //
  // Trả về:
  // - CURRENT key (đang dùng để sign)
  // - NEXT key (sẽ dùng trong tương lai)
  // - OLD key (để verify token cũ)
  //
  rpc GetKeys (GetKeysRequest) returns (GetKeysResponse);

  // --------------------------------------------------------
  // Lấy key theo ID (kid)
  // --------------------------------------------------------
  //
  // Dùng cho:
  // - debug
  // - audit
  // - re-sync
  //
  // Không dùng trong flow chính
  //
  rpc GetKeyById (GetKeyByIdRequest) returns (GetKeyResponse);
}


// ========================================================
// ENUMS
// ========================================================

enum KeyAlgorithm {
  KEY_ALGORITHM_UNSPECIFIED = 0;

  RSA = 1;
  EC = 2;
}

enum KeyStatus {
  KEY_STATUS_UNSPECIFIED = 0;

  CURRENT = 1;
  NEXT = 2;
  OLD = 3;
}


// ========================================================
// REQUEST MESSAGES
// ========================================================

message GetKeysRequest {

  // Tên service (multi-tenant)
  // Ví dụ: identity-service, payment-service
  string service = 1;

  // Có cần private key không
  //
  // true  → Identity Service
  // false → các service verify
  //
  // ⚠️ Server phải enforce security, không tin tưởng client flag
  bool include_private = 2;

  // Service gọi request (audit / security)
  // Ví dụ: identity-service
  string requester = 3;
}

message GetKeyByIdRequest {
  string kid = 1;
}


// ========================================================
// RESPONSE MESSAGES
// ========================================================

message GetKeysResponse {

  // Danh sách full keyset
  //
  // Bao gồm:
  // - key đang dùng (CURRENT)
  // - key sắp dùng (NEXT)
  // - key cũ (OLD)
  //
  // Client phải:
  // - KHÔNG dựa vào status
  // - mà dựa vào activate_at / expires_at
  //
  repeated GetKeyResponse keys = 1;

  // Số lượng key (future use: pagination, monitoring)
  int32 total = 2;
}


message GetKeyResponse {

  // =========================
  // Metadata
  // =========================

  // Key ID (unique)
  string kid = 1;

  // Thuật toán
  KeyAlgorithm algorithm = 2;

  // ⚠️ Chỉ mang tính metadata
  // KHÔNG dùng cho logic sign/verify
  KeyStatus status = 3;

  // Service sở hữu key
  string service = 9;


  // =========================
  // Key data
  // =========================

  // Public key (PEM / JWK)
  optional string public_key = 4;

  // Private key (encrypted)
  //
  // ⚠️ CHỈ trả khi include_private = true
  // ⚠️ Chỉ dành cho Identity Service
  optional string private_key = 5;


  // =========================
  // Lifecycle
  // =========================

  // Thời điểm tạo key
  google.protobuf.Timestamp created_at = 6;

  // Thời điểm bắt đầu SIGN
  //
  // Logic:
  // - key active khi now >= activate_at
  google.protobuf.Timestamp activate_at = 7;

  // Thời điểm NGỪNG VERIFY
  //
  // Logic:
  // - sau thời điểm này → key không còn dùng để verify
  google.protobuf.Timestamp expires_at = 8;


  // =========================
  // Crypto metadata
  // =========================

  // Key size (2048, 4096...)
  int32 key_size = 10;
}