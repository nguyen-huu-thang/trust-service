syntax = "proto3";

package trust.external.cert;

option java_package = "vn.xime.trust.grpc.external.certificate";
option java_multiple_files = true;


// ==================================================
// CERTIFICATE SERVICE (mTLS RUNTIME)
// ==================================================
//
// ⚠️ EXTERNAL API
// - Dùng cho service-to-service authentication
// - KHÔNG phải admin API
//
// USE CASE:
// 1. Bootstrap certificate (lần đầu)
// 2. Rotate certificate (dùng refresh token)
//
// SECURITY:
// - Certificate là identity của service
// - Refresh token là one-time + bound
//
service CertificateService {

  // ==================================================
  // BOOTSTRAP (FIRST TIME)
  // ==================================================
  //
  // 👉 dùng khi:
  // - service mới deploy
  // - chưa có certificate
  //
  // ⚠️ cần cơ chế auth riêng:
  // - API key / bootstrap secret / provisioning
  //
  rpc BootstrapCertificate (BootstrapCertificateRequest)
      returns (BootstrapCertificateResponse);


  // ==================================================
  // ROTATION (RUNTIME)
  // ==================================================
  //
  // 👉 dùng khi:
  // - certificate gần hết hạn
  //
  // flow:
  // - gửi refresh token
  // - nhận cert mới + token mới
  //
  rpc RotateCertificate (RotateCertificateRequest)
      returns (RotateCertificateResponse);
}


message BootstrapCertificateRequest {
  string service_id = 1;
  string shard_id = 2;
}


message BootstrapCertificateResponse {

  CertificateDto certificate = 1;
  string refresh_token = 2; // 🔥 token dùng cho lần rotate tiếp theo
  string service_id = 3;
  int64 issued_at = 4;
  int64 expires_at = 5;
}


message RotateCertificateRequest {
  string service_id = 1;
  string refresh_token = 2;
  string private_key = 3;
}


message RotateCertificateResponse {
  CertificateDto certificate = 1;
  string next_refresh_token = 2;  // 🔥 token mới (chain rotation)
  string refresh_token_id = 3;
  int64 issued_at = 4;
  int64 expires_at = 5;
}


message CertificateDto {

  string id = 1;

  // PEM format
  string public_cert = 2;

  string private_key = 3;

}


