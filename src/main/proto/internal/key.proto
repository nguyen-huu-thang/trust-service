syntax = "proto3";

package trust.internal.key;

option java_package = "vn.xime.trust.grpc.internal.key";
option java_multiple_files = true;


// ==================================================
// KEY MANAGEMENT
// ==================================================

service KeyAdmin {

  // Generate new key
  rpc InitKey (InitKeyRequest)
      returns (InitKeyResponse);

  // =========================
  // GET (ADMIN ONLY)
  // =========================

  rpc GetKeyById (GetKeyByIdRequest)
      returns (GetKeyByIdResponse);

  rpc GetKeysBySigner (GetKeysBySignerRequest)
      returns (GetKeysBySignerResponse);

  rpc GetKeysBySignerAndVerifier (GetKeysBySignerAndVerifierRequest)
      returns (GetKeysBySignerAndVerifierResponse);

  // Delete
  rpc DeleteKey (DeleteKeyRequest)
      returns (DeleteKeyResponse);
}


// ==================================================
// GENERATE
// ==================================================

message InitKeyRequest {
  string signer_service_id = 1;
  string verifier_service_id = 2;
}

message InitKeyResponse {
  KeyDto key = 1;
}

// ==================================================
// GET (ADMIN)
// ==================================================

message GetKeyByIdRequest {
  string id = 1;
}

message GetKeyByIdResponse {
  KeyDto key = 1;
}

// --------------------------------------------------

message GetKeysBySignerRequest {
  string signer_service_id = 1;
}

message GetKeysBySignerResponse {
  repeated KeyDto keys = 1;
}

// --------------------------------------------------

message GetKeysBySignerAndVerifierRequest {
  string signer_service_id = 1;
  string verifier_service_id = 2;
}

message GetKeysBySignerAndVerifierResponse {
  repeated KeyDto keys = 1;
}


// ==================================================
// DELETE
// ==================================================

message DeleteKeyRequest {
  string id = 1;
}

message DeleteKeyResponse {
  string status = 1;
}


// ==================================================
// DTO
// ==================================================

message KeyDto {

  string id = 1;
  string signer_service_id = 2;
  string verifier_service_id = 3;

  string algorithm = 4;
  int32 key_size = 5;

  int64 created_at = 6;
  int64 activate_at = 7;
  int64 expires_at = 8;

  bool is_deleted = 9;
}