syntax = "proto3";

package trust.internal.service;

option java_package = "vn.xime.trust.grpc.internal.service";
option java_multiple_files = true;


// ==================================================
// SERVICE MANAGEMENT
// ==================================================

service ServiceAdmin {

  // Create service
  rpc CreateService (CreateServiceRequest)
      returns (CreateServiceResponse);

  // =========================
  // GET APIs (match usecase)
  // =========================

  rpc GetServiceById (GetServiceByIdRequest)
      returns (GetServiceByIdResponse);

  rpc GetAllServices (GetAllServicesRequest)
      returns (GetAllServicesResponse);

  rpc GetAllServicesPaged (GetAllServicesPagedRequest)
      returns (GetAllServicesPagedResponse);

  rpc GetServicesByTenant (GetServicesByTenantRequest)
      returns (GetServicesByTenantResponse);

  rpc GetServicesByTenantIsNull (GetServicesByTenantIsNullRequest)
      returns (GetServicesByTenantIsNullResponse);

  // Update service status
  rpc UpdateServiceStatus (UpdateServiceStatusRequest)
      returns (UpdateServiceStatusResponse);
}


// ==================================================
// REQUEST / RESPONSE
// ==================================================

message CreateServiceRequest {
  string id = 1;
  string name = 2;
  string tenant = 3;
}

message CreateServiceResponse {
  ServiceDto service = 1;
}

// ==================================================
// GET APIs
// ==================================================

message GetServiceByIdRequest {
  string id = 1;
}

message GetServiceByIdResponse {
  ServiceDto service = 1;
}

// --------------------------------------------------

message GetAllServicesRequest {}

message GetAllServicesResponse {
  repeated ServiceDto services = 1;
}

// --------------------------------------------------

message GetAllServicesPagedRequest {
  int32 page = 1;
  int32 size = 2;
}

message GetAllServicesPagedResponse {
  repeated ServiceDto services = 1;
}

// --------------------------------------------------

message GetServicesByTenantRequest {
  string tenant = 1;
  int32 page = 2;
  int32 size = 3;
}

message GetServicesByTenantResponse {
  repeated ServiceDto services = 1;
}

// --------------------------------------------------

message GetServicesByTenantIsNullRequest {
  int32 page = 1;
  int32 size = 2;
}

message GetServicesByTenantIsNullResponse {
  repeated ServiceDto services = 1;
}

// --------------------------------------------------

message UpdateServiceStatusRequest {
  string id = 1;
  string status = 2;
}

message UpdateServiceStatusResponse {
  string status = 1;
}


// ==================================================
// DTO
// ==================================================

message ServiceDto {
  string id = 1;
  string name = 2;
  string tenant = 3;

  string status = 4;

  int64 created_at = 5;
}