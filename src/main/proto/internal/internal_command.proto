syntax = "proto3";

package trust.internal;

option java_package = "vn.xime.trust.grpc.internal";
option java_multiple_files = true;


// ==================================================
// INTERNAL ADMIN SERVICE (CLI TOOL)
// ==================================================
//
// ⚠️ Đây là INTERNAL API (KHÔNG expose ra ngoài)
// - Chỉ dùng cho:
//   + CLI tool
//   + Admin console
//   + Internal automation
//
// ❌ KHÔNG dùng trong runtime request flow
// ❌ KHÔNG dùng cho public client
//
// 👉 Đây là CONTROL PLANE của Trust Service
//
service InternalAdminService {

  // =========================
  // SERVICE MANAGEMENT
  // =========================

  /**
   * Tạo service mới trong hệ thống.
   *
   * 👉 service_id là identity của service (global unique)
   *
   * ⚠️ Chỉ dùng khi:
   * - bootstrap hệ thống
   * - onboard service mới
   */
  rpc CreateService (CreateServiceRequest) returns (CreateServiceResponse);

  /**
   * Lấy danh sách tất cả service.
   *
   * 👉 Dùng cho admin UI / debug
   */
  rpc GetServices (GetServicesRequest) returns (GetServicesResponse);


  // =========================
  // SHARD MANAGEMENT
  // =========================

  /**
   * Register một instance (shard) của service.
   *
   * 👉 Mỗi shard = 1 instance đang chạy (pod / VM)
   *
   * Dùng cho:
   * - tracking deployment
   * - safe cert rotation theo từng shard
   */
  rpc RegisterShard (RegisterShardRequest) returns (RegisterShardResponse);

  /**
   * Cập nhật trạng thái shard.
   *
   * status:
   * - ACTIVE
   * - DRAINING
   * - DEAD
   *
   * 👉 Dùng cho rollout / shutdown an toàn
   */
  rpc UpdateShardStatus (UpdateShardStatusRequest) returns (UpdateShardStatusResponse);


  // =========================
  // TRUST MANAGEMENT
  // =========================

  /**
   * Tạo trust relationship giữa 2 service:
   *
   * signer → verifier
   *
   * 👉 Đây là CORE của hệ thống
   *
   * Ví dụ:
   * identity-service → user-service
   *
   * 👉 Đồng thời định nghĩa:
   * - key lifecycle
   * - JWT TTL
   * - rotation policy
   */
  rpc CreateTrust (CreateTrustRequest) returns (CreateTrustResponse);

  /**
   * Lấy danh sách trust.
   *
   * Có thể filter:
   * - theo signer
   * - theo verifier
   */
  rpc GetTrusts (GetTrustsRequest) returns (GetTrustsResponse);


  // =========================
  // KEY MANAGEMENT (JWT)
  // =========================

  /**
   * Generate key mới cho cặp (signer → verifier).
   *
   * ⚠️ Đây là CONTROL ACTION (không phải runtime)
   *
   * activate_at:
   * - thời điểm bắt đầu dùng để SIGN
   *
   * 👉 Không có CURRENT/NEXT
   * 👉 Time-based lifecycle
   */
  rpc GenerateKey (GenerateKeyRequest) returns (GenerateKeyResponse);

  /**
   * Rotate key:
   * - thực chất là generate key mới với activate_at tương lai
   *
   * ⚠️ Không revoke key cũ ngay
   *
   * 👉 đảm bảo backward-compatible JWT
   */
  rpc RotateKey (RotateKeyRequest) returns (RotateKeyResponse);

  /**
   * Lấy danh sách key.
   *
   * 👉 Trả về:
   * - key đang SIGN
   * - key dùng để VERIFY
   * - key chuẩn bị SIGN
   *
   * ⚠️ Client phải tự suy luận:
   * - current key
   * - next key
   *
   * ❌ Không rely vào status
   */
  rpc GetKeys (GetKeysRequest) returns (GetKeysResponse);


  // =========================
  // CERT MANAGEMENT (mTLS)
  // =========================

  /**
   * Cấp certificate cho service (mTLS).
   *
   * 👉 Dùng cho:
   * - service-to-service auth
   *
   * ⚠️ Không liên quan đến JWT
   */
  rpc IssueCertificate (IssueCertificateRequest) returns (IssueCertificateResponse);

  /**
   * Lấy danh sách certificate của service.
   *
   * 👉 Dùng cho audit / debug
   */
  rpc GetCertificates (GetCertificatesRequest) returns (GetCertificatesResponse);


  // =========================
  // DEBUG / AUDIT
  // =========================

  /**
   * Lấy lịch sử event của key.
   *
   * 👉 Dùng cho:
   * - debug rotation
   * - audit security
   */
  rpc GetKeyEvents (GetKeyEventsRequest) returns (GetKeyEventsResponse);

  /**
   * Lấy lịch sử event của certificate.
   */
  rpc GetCertEvents (GetCertEventsRequest) returns (GetCertEventsResponse);


  // =========================
  // HEALTH
  // =========================

  /**
   * Health check service.
   *
   * 👉 Dùng cho:
   * - monitoring
   * - load balancer
   */
  rpc Health (HealthRequest) returns (HealthResponse);
}


// ==================================================
// SERVICE
// ==================================================

message CreateServiceRequest {
  string id = 1;
  string name = 2;
  string tenant = 3;
}

message CreateServiceResponse {
  string status = 1; // CREATED
}

message GetServicesRequest {}

message GetServicesResponse {
  repeated ServiceDto services = 1;
}

message ServiceDto {
  string id = 1;
  string name = 2;
  string tenant = 3;
  string status = 4;
  int64 created_at = 5;
}


// ==================================================
// SHARD
// ==================================================

message RegisterShardRequest {
  string shard_id = 1;
  string service_id = 2;

  string host = 3;
  int32 port = 4;

  string version = 5;
}

message RegisterShardResponse {
  string status = 1; // REGISTERED
}

message UpdateShardStatusRequest {
  string shard_id = 1;
  string status = 2; // ACTIVE / DRAINING / DEAD
}

message UpdateShardStatusResponse {
  string status = 1;
}


// ==================================================
// TRUST (CORE)
// ==================================================

message CreateTrustRequest {
  string signer_service_id = 1;
  string verifier_service_id = 2;

  int64 key_lifetime_seconds = 3;
  int64 jwt_ttl_seconds = 4;
  int64 preload_seconds = 5;
}

message CreateTrustResponse {
  string status = 1; // CREATED
}

message GetTrustsRequest {
  string signer_service_id = 1;    // optional
  string verifier_service_id = 2;  // optional
}

message GetTrustsResponse {
  repeated TrustDto trusts = 1;
}

message TrustDto {
  string signer_service_id = 1;
  string verifier_service_id = 2;

  int64 key_lifetime_seconds = 3;
  int64 jwt_ttl_seconds = 4;
  int64 preload_seconds = 5;

  bool auto_rotate = 6;

  int64 last_rotated_at = 7;
  int64 next_rotation_at = 8;

  int64 created_at = 9;
}


// ==================================================
// KEYS (JWT)
// ==================================================

message GenerateKeyRequest {
  string signer_service_id = 1;
  string verifier_service_id = 2;

  string algorithm = 3;   // RSA, EC
  int32 key_size = 4;

  int64 activate_at = 5;
}

message GenerateKeyResponse {
  string kid = 1;
  string status = 2; // CREATED
}

message RotateKeyRequest {
  string signer_service_id = 1;
  string verifier_service_id = 2;

  int64 activate_at = 3;
}

message RotateKeyResponse {
  string new_kid = 1;
  string status = 2; // ROTATED
}

message GetKeysRequest {
  string signer_service_id = 1;
  string verifier_service_id = 2; // optional
}

message GetKeysResponse {
  repeated KeyDto keys = 1;
}

message KeyDto {
  string kid = 1;

  string signer_service_id = 2;
  string verifier_service_id = 3;

  string algorithm = 4;
  int32 key_size = 5;

  int64 created_at = 6;
  int64 activate_at = 7;
  int64 expires_at = 8;
}


// ==================================================
// CERTIFICATES (mTLS)
// ==================================================

message IssueCertificateRequest {
  string service_id = 1;
}

message IssueCertificateResponse {
  string kid = 1;
  string status = 2; // ISSUED
}

message GetCertificatesRequest {
  string service_id = 1;
}

message GetCertificatesResponse {
  repeated CertificateDto certificates = 1;
}

message CertificateDto {
  string kid = 1;
  string service_id = 2;

  int64 issued_at = 3;
  int64 expires_at = 4;

  string status = 5;
}


// ==================================================
// KEY EVENTS
// ==================================================

message GetKeyEventsRequest {
  string signer_service_id = 1;    // optional
  string verifier_service_id = 2;  // optional
}

message GetKeyEventsResponse {
  repeated KeyEventDto events = 1;
}

message KeyEventDto {
  string kid = 1;

  string signer_service_id = 2;
  string verifier_service_id = 3;

  string event_type = 4;
  int64 created_at = 5;
}


// ==================================================
// CERT EVENTS
// ==================================================

message GetCertEventsRequest {
  string service_id = 1;
}

message GetCertEventsResponse {
  repeated CertEventDto events = 1;
}

message CertEventDto {
  string kid = 1;
  string service_id = 2;

  string event_type = 3;
  int64 created_at = 4;
}


// ==================================================
// HEALTH
// ==================================================

message HealthRequest {}

message HealthResponse {
  string status = 1; // OK
}