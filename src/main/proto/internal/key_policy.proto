syntax = "proto3";

package trust.internal.keypolicy;

option java_package = "vn.xime.trust.grpc.internal.keypolicy";
option java_multiple_files = true;


// ==================================================
// KEY POLICY MANAGEMENT
// ==================================================

service KeyPolicyAdmin {

  // Create policy
  rpc CreateKeyPolicy (CreateKeyPolicyRequest)
      returns (CreateKeyPolicyResponse);

  // =========================
  // GET APIs (match usecase)
  // =========================

  rpc GetKeyPolicyById (GetKeyPolicyByIdRequest)
      returns (GetKeyPolicyByIdResponse);

  rpc GetKeyPolicyByPair (GetKeyPolicyByPairRequest)
      returns (GetKeyPolicyByPairResponse);

  rpc GetKeyPoliciesBySigner (GetKeyPoliciesBySignerRequest)
      returns (GetKeyPoliciesBySignerResponse);

  rpc GetKeyPoliciesByVerifier (GetKeyPoliciesByVerifierRequest)
      returns (GetKeyPoliciesByVerifierResponse);

  // =========================
  // UPDATE
  // =========================

  rpc UpdateKeyPolicy (UpdateKeyPolicyRequest)
      returns (UpdateKeyPolicyResponse);

  // =========================
  // DELETE
  // =========================

  rpc DeleteKeyPolicy (DeleteKeyPolicyRequest)
      returns (DeleteKeyPolicyResponse);
}


// ==================================================
// REQUEST / RESPONSE
// ==================================================

message CreateKeyPolicyRequest {

  string signer_service_id = 1;
  string verifier_service_id = 2;

  int64 key_lifetime_seconds = 3;
  int64 jwt_ttl_seconds = 4;
  int64 preload_seconds = 5;
}

message CreateKeyPolicyResponse {
  KeyPolicyDto policy = 1;
}


// ==================================================
// GET
// ==================================================

message GetKeyPolicyByIdRequest {
  string id = 1;
}

message GetKeyPolicyByIdResponse {
  KeyPolicyDto policy = 1;
}

// --------------------------------------------------

message GetKeyPolicyByPairRequest {
  string signer_service_id = 1;
  string verifier_service_id = 2;
}

message GetKeyPolicyByPairResponse {
  KeyPolicyDto policy = 1;
}

// --------------------------------------------------

message GetKeyPoliciesBySignerRequest {
  string signer_service_id = 1;
}

message GetKeyPoliciesBySignerResponse {
  repeated KeyPolicyDto policies = 1;
}

// --------------------------------------------------

message GetKeyPoliciesByVerifierRequest {
  string verifier_service_id = 1;
}

message GetKeyPoliciesByVerifierResponse {
  repeated KeyPolicyDto policies = 1;
}


// ==================================================
// UPDATE
// ==================================================

message UpdateKeyPolicyRequest {

  string id = 1;

  int64 key_lifetime_seconds = 2;
  int64 jwt_ttl_seconds = 3;
  int64 preload_seconds = 4;
}

message UpdateKeyPolicyResponse {
  KeyPolicyDto policy = 1;
}


// ==================================================
// DELETE
// ==================================================

message DeleteKeyPolicyRequest {
  string id = 1;
}

message DeleteKeyPolicyResponse {
  bool success = 1;
}


// ==================================================
// DTO
// ==================================================

message KeyPolicyDto {

  string id = 1; // 🔥 đổi từ bytes → string (Base62)

  string signer_service_id = 2;
  string verifier_service_id = 3;

  int64 key_lifetime_seconds = 4;
  int64 jwt_ttl_seconds = 5;
  int64 preload_seconds = 6;

  int64 created_at = 7;
  int64 updated_at = 8;
}