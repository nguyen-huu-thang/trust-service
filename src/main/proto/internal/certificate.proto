syntax = "proto3";

package trust.internal.certificate;

option java_package = "vn.xime.trust.grpc.internal.certificate";
option java_multiple_files = true;


// ==================================================
// CERTIFICATE MANAGEMENT (mTLS)
// ==================================================

service CertificateAdmin {

  // Issue new certificate
  rpc IssueCertificate (IssueCertificateRequest)
      returns (IssueCertificateResponse);

  // Get certificate by id
  rpc GetCertificate (GetCertificateRequest)
      returns (GetCertificateResponse);

  // List certificates of a service
  rpc ListCertificates (ListCertificatesRequest)
      returns (ListCertificatesResponse);

  // Revoke (soft)
  rpc RevokeCertificate (RevokeCertificateRequest)
      returns (RevokeCertificateResponse);
}


// ==================================================
// ISSUE
// ==================================================

message IssueCertificateRequest {

  string service_id = 1;

  // optional config
  int64 ttl_seconds = 2;

  // metadata
  string issued_by = 3; // system / admin / automation
}

message IssueCertificateResponse {
  CertificateDto certificate = 1;
}

// ==================================================
// GET
// ==================================================

message GetCertificateRequest {
  bytes id = 1; // KSUID
}

message GetCertificateResponse {
  CertificateDto certificate = 1;
}


// ==================================================
// LIST
// ==================================================

message ListCertificatesRequest {

  string service_id = 1;

  string status = 2;

  // time range
  int64 from_time = 3;
  int64 to_time = 4;

  // pagination
  int32 limit = 5;
  string cursor = 6;
}

message ListCertificatesResponse {
  repeated CertificateDto certificates = 1;
  string next_cursor = 2;
}


// ==================================================
// REVOKE
// ==================================================

message RevokeCertificateRequest {
  bytes id = 1;
  string reason = 2;
}

message RevokeCertificateResponse {
  string status = 1;
}

// ==================================================
// DTO
// ==================================================

message CertificateDto {

  bytes id = 1;

  string service_id = 2;

  // cert data
  string public_cert = 3;

  // ⚠️ chỉ trả cho service owner hoặc internal
  string private_key_encrypted = 4;

  // lifecycle
  int64 issued_at = 5;
  int64 expires_at = 6;

  string status = 7; // ACTIVE / REVOKED / EXPIRED
}