syntax = "proto3";

package trust.internal.shard;

option java_package = "vn.xime.trust.grpc.internal.shard";
option java_multiple_files = true;


// ==================================================
// SHARD MANAGEMENT
// ==================================================

service ShardAdmin {

  // Register shard (instance up)
  rpc RegisterShard (RegisterShardRequest)
      returns (RegisterShardResponse);

  // Update lifecycle (ACTIVE / DRAINING / DEAD)
  rpc UpdateShardStatus (UpdateShardStatusRequest)
      returns (UpdateShardStatusResponse);

  // =========================
  // GET APIs (match usecase)
  // =========================

  rpc GetShardById (GetShardByIdRequest)
      returns (GetShardByIdResponse);

  rpc GetShardsByService (GetShardsByServiceRequest)
      returns (GetShardsByServiceResponse);

  rpc GetAllShards (GetAllShardsRequest)
      returns (GetAllShardsResponse);

  rpc GetAllShardsPaged (GetAllShardsPagedRequest)
      returns (GetAllShardsPagedResponse);
}


// ==================================================
// REQUEST / RESPONSE
// ==================================================

message RegisterShardRequest {
  string id = 1;
  string service_id = 2;

  string host = 3;
  int32 port = 4;
}

message RegisterShardResponse {
  ShardDto shard = 1;
}

// --------------------------------------------------

message UpdateShardStatusRequest {
  string shard_id = 1;
  string status = 2;
}

message UpdateShardStatusResponse {
  string status = 1;
}

// ==================================================
// GET APIs
// ==================================================

message GetShardByIdRequest {
  string id = 1;
}

message GetShardByIdResponse {
  ShardDto shard = 1;
}

// --------------------------------------------------

message GetShardsByServiceRequest {
  string service_id = 1;
}

message GetShardsByServiceResponse {
  repeated ShardDto shards = 1;
}

// --------------------------------------------------

message GetAllShardsRequest {}

message GetAllShardsResponse {
  repeated ShardDto shards = 1;
}

// --------------------------------------------------

message GetAllShardsPagedRequest {
  int32 page = 1;
  int32 size = 2;
}

message GetAllShardsPagedResponse {
  repeated ShardDto shards = 1;
}


// ==================================================
// DTO
// ==================================================

message ShardDto {

  string id = 1;
  string service_id = 2;

  string host = 3;
  int32 port = 4;

  string status = 5;

  int64 created_at = 6;
}